<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - CIFAKE Image Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #d53c2a;
            --primary-dark: #b83a28;
            --surface: #fffbfe;
            --on-bg: #1c1b1f;
            --on-variant: #49454f;
            --outline: #ccc7d0;
        }
    
        body {
            background: linear-gradient(135deg, #ffdad4 0%, #ffe5e0 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .signin-container {
            width: 100%;
            max-width: 420px;
            background: var(--surface);
            border-radius: 28px;
            padding: 2.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        .signin-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .signin-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--on-bg);
            margin-bottom: 0.5rem;
        }

        .signin-subtitle {
            font-size: 14px;
            color: var(--on-variant);
        }

        .form-section {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .form-label {
            font-weight: 600;
            color: var(--on-bg);
            font-size: 14px;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem;
            border: 1px solid var(--outline);
            border-radius: 12px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
            background: white;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(213, 60, 42, 0.1);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 14px;
            gap: 1rem;
        }

        .remember-checkbox {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .remember-checkbox input {
            cursor: pointer;
            accent-color: var(--primary);
        }

        .forgot-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .btn-signin {
            width: 100%;
            padding: 0.875rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            margin-top: 0.5rem;
        }

        .btn-signin:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(213, 60, 42, 0.3);
        }

        .divider {
            text-align: center;
            margin: 1.5rem 0;
            color: var(--on-variant);
            font-size: 12px;
        }

        .auth-links {
            text-align: center;
            font-size: 14px;
            margin-top: 1.5rem;
        }

        .auth-links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-links-separator {
            margin: 1rem 0;
        }

        .alert {
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            font-size: 14px;
            border: 1px solid;
        }

        .alert-success {
            background-color: rgba(76, 175, 80, 0.1);
            color: #2e7d32;
            border-color: rgba(76, 175, 80, 0.3);
        }

        .alert-error {
            background-color: rgba(211, 47, 47, 0.1);
            color: #c62828;
            border-color: rgba(211, 47, 47, 0.3);
        }
    </style>
</head>
<body>
    <div class="signin-container">
        <!-- Header -->
        <div class="signin-header">
            <h1 class="signin-title">🔐 Sign In</h1>
            <p class="signin-subtitle">Welcome back to CIFAKE</p>
        </div>
        
        <!-- Alerts -->
        <div id="alertContainer"></div>
        
        <!-- Sign In Form -->
        <form id="signinForm" class="form-section">
            <!-- Username -->
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input type="text" class="form-input" id="username" name="username" 
                       placeholder="Enter your username" required autofocus>
            </div>
            
            <!-- Password -->
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" class="form-input" id="password" name="password" 
                       placeholder="Enter your password" required>
            </div>
            
            <!-- Remember Me & Need Help -->
            <div class="form-options">
                <label class="remember-checkbox">
                    <input type="checkbox" id="rememberMe" name="rememberMe">
                    <span>Remember me</span>
                </label>
                <a href="/" class="forgot-link">Need help?</a>
            </div>
            
            <!-- Submit Button -->
            <button type="submit" class="btn-signin">Sign In</button>
        </form>
        
        <!-- Divider -->
        <div class="divider">or continue with</div>
        
        <!-- Auth Links -->
        <div class="auth-links">
            <div>Don't have an account? <a href="/signup">Sign Up</a></div>
            <div class="auth-links-separator"></div>
            <a href="/">← Back to Home</a>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const params = new URLSearchParams(window.location.search);
            const email = params.get('email');
            
            if (email) {
                showAlert('success', 'Account created! Please sign in with your username and password.');
            }
        });
        
        function showAlert(type, message) {
            const container = document.getElementById('alertContainer');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            container.appendChild(alertDiv);
            
            setTimeout(() => alertDiv.remove(), 5000);
        }
        
        document.getElementById('signinForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                rememberMe: document.getElementById('rememberMe').checked
            };
            
            try {
                const response = await fetch('/api/signin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showAlert('success', 'Sign in successful! Redirecting...');
                    setTimeout(() => window.location.href = '/analyzer', 1500);
                } else {
                    const errorMsg = data.errors ? (Array.isArray(data.errors) ? data.errors.join(', ') : Object.values(data.errors).join(', ')) : (data.error || 'Sign in failed');
                    showAlert('error', errorMsg);
                }
            } catch (error) {
                showAlert('error', 'An error occurred. Please try again.');
            }
        });
    </script>
</body>
</html>
